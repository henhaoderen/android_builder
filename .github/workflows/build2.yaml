steps:
  - name: Checkout the code
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: temurin

  # 安装系统Python3
  - name: Install Python3
    run: sudo apt update && sudo apt install -y python3 python3-pip

  - id: get-project
    name: Get project git url
    run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

  - name: Clone android source
    run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

  # 解决local.properties缺失
  - name: Create local.properties
    working-directory: ./project
    run: echo "sdk.dir=$ANDROID_HOME" > local.properties

  # 修复硬编码Windows Python路径
  - name: Fix Chaquo buildPython path
    working-directory: ./project
    run: |
      sed -i '/chaquopy {/a\        buildPython = "/usr/bin/python3"' pyramid/build.gradle

  - name: Build APK
    working-directory: ./project
    run: |
      if [ ! -f "gradlew" ]; then gradle wrapper; fi
      chmod +x gradlew
      ./gradlew assembleDebug --stacktrace

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: my-build-apk
      path: ./project/**/*.apk
      overwrite: true
      if-no-files-found: error
