name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python3
        run: sudo apt update && sudo apt install -y python3 python3-pip

      - id: get-project
        name: Get project git url
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone android source
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      - name: Create local.properties
        working-directory: ./project
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ========================================================
      # 彻底清除所有阿里云镜像，只保留官方仓库
      # ========================================================
      - name: Remove Aliyun and add official repositories
        working-directory: ./project
        run: |
          # 1. 删除所有包含 maven.aliyun.com 的行
          find . -name "*.gradle" -type f -exec sed -i '/maven.aliyun.com/d' {} \;

          # 2. 处理根目录 build.gradle：强制替换 buildscript 和 allprojects 的 repositories
          cat > build.gradle.new << 'EOF'
          // 自动生成的官方仓库配置
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
              dependencies {
                  // 请确保 classpath 与项目一致，此处保留原有声明（后续会追加）
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF

          # 提取原文件中的 dependencies 部分（保留 classpath）
          if grep -q 'dependencies {' build.gradle; then
              sed -n '/dependencies {/,/}/p' build.gradle > deps.gradle
              # 将 deps.gradle 内容插入到 build.gradle.new 的 buildscript 块中
              sed -i '/dependencies {/r deps.gradle' build.gradle.new
              rm deps.gradle
          fi

          # 覆盖原 build.gradle
          mv build.gradle.new build.gradle

          # 3. 处理 settings.gradle（如果有）
          if [ -f settings.gradle ]; then
              # 删除所有阿里云行
              sed -i '/maven.aliyun.com/d' settings.gradle
              # 如果存在 dependencyResolutionManagement，替换其 repositories
              if grep -q 'dependencyResolutionManagement' settings.gradle; then
                  sed -i '/dependencyResolutionManagement/,/repositories {/c\
          dependencyResolutionManagement {\
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\
              repositories {\
                  google()\
                  mavenCentral()\
                  maven { url "https://jitpack.io" }\
              }\
          }' settings.gradle
              else
                  # 没有则追加
                  cat >> settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF
              fi
          fi

          # 4. 清理子模块中独立的 repositories（避免冲突）
          for mod in app pyramid; do
              if [ -f "$mod/build.gradle" ]; then
                  sed -i '/repositories {/,/}/d' "$mod/build.gradle"
              fi
          done

      # ========================================================
      # 修复 Chaquo Python 路径（Windows → Linux）
      # ========================================================
      - name: Fix Chaquo Python Path
        working-directory: ./project
        run: |
          if [ -f pyramid/build.gradle ]; then
            sed -i '/chaquopy {/a\        buildPython = "/usr/bin/python3"' pyramid/build.gradle
          fi

      - name: Build APK
        working-directory: ./project
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 7.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./project/app/build/outputs/apk/**/*.apk
          overwrite: true
          if-no-files-found: error
