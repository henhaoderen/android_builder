name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python3
        run: sudo apt update && sudo apt install -y python3 python3-pip

      - id: get-project
        name: Get project git url
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone android source
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      - name: Create local.properties
        working-directory: ./project
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ========================================================
      # 安全修复仓库：删除阿里云，添加官方源（保留原变量）
      # ========================================================
      - name: Fix repositories (remove Aliyun, add official)
        working-directory: ./project
        run: |
          python3 << 'PYTHON_SCRIPT'
          import re
          import os

          def fix_repositories(filepath):
              if not os.path.exists(filepath):
                  return
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()

              # 1. 删除所有包含 maven.aliyun.com 的行
              content = re.sub(r'(?m)^\s*.*maven\.aliyun\.com.*$\n?', '', content)

              # 2. 定义需要确保存在的仓库条目
              entries = [
                  'google()',
                  'mavenCentral()',
                  "maven { url 'https://jitpack.io' }"
              ]

              # 3. 处理 buildscript 和 allprojects 中的 repositories 块
              def add_missing_repos(match):
                  block = match.group(0)
                  missing = []
                  for entry in entries:
                      if entry not in block:
                          missing.append(entry)
                  if missing:
                      indent = '        '  # 假设缩进为 8 个空格，可根据实际情况调整
                      insert_lines = '\n' + indent + ('\n' + indent).join(missing)
                      block = block.rstrip()[:-1] + insert_lines + '\n    }'
                  return block

              # 处理 buildscript 块
              pattern = r'(buildscript\s*\{[^}]*repositories\s*\{[^}]*\})'
              content = re.sub(pattern, add_missing_repos, content, flags=re.DOTALL)

              # 处理 allprojects 块
              pattern = r'(allprojects\s*\{[^}]*repositories\s*\{[^}]*\})'
              content = re.sub(pattern, add_missing_repos, content, flags=re.DOTALL)

              # 处理 settings.gradle 中的 dependencyResolutionManagement
              if 'settings.gradle' in filepath:
                  pattern = r'(dependencyResolutionManagement\s*\{[^}]*repositories\s*\{[^}]*\})'
                  content = re.sub(pattern, add_missing_repos, content, flags=re.DOTALL)

              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(content)

          # 处理主要文件
          fix_repositories('build.gradle')
          fix_repositories('settings.gradle')
          # 处理子模块（如果存在）
          for mod in ['app', 'pyramid']:
              fix_repositories(f'{mod}/build.gradle')
          PYTHON_SCRIPT

      # ========================================================
      # 修复 Chaquo Python 路径（Windows → Linux）
      # ========================================================
      - name: Fix Chaquo Python Path
        working-directory: ./project
        run: |
          if [ -f pyramid/build.gradle ]; then
            sed -i '/chaquopy {/a\        buildPython = "/usr/bin/python3"' pyramid/build.gradle
          fi

      - name: Build APK
        working-directory: ./project
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 7.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./project/app/build/outputs/apk/**/*.apk
          overwrite: true
          if-no-files-found: error
