name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python3
        run: sudo apt update && sudo apt install -y python3 python3-pip

      - id: get-project
        name: Get project git url
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone android source
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      - name: Create local.properties
        working-directory: ./project
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ========================================================
      # 彻底修复 Maven 仓库配置（覆盖所有 repositories 块）
      # ========================================================
      - name: Override all repositories to official Maven/Google
        working-directory: ./project
        run: |
          # 1. 覆盖根目录 build.gradle 中的 allprojects / subprojects
          cat > build.gradle.override << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          // 保留原始 build.gradle 的其他内容（如 buildscript、插件声明等）
          // 下面将原文件内容追加到这个文件之后
          EOF

          # 备份原 build.gradle，然后合并
          cp build.gradle build.gradle.bak
          # 提取原文件中不包含 allprojects 块的内容（避免重复）
          # 更简单的方法：将原文件中的 allprojects 块替换掉
          if grep -q '^allprojects' build.gradle; then
              # 删除原有的 allprojects 块（从 allprojects 到匹配的 } 假设是顶级块）
              sed -i '/^allprojects/,/^}/c\
          allprojects {\
              repositories {\
                  google()\
                  mavenCentral()\
              }\
          }' build.gradle
          else
              # 如果没有 allprojects，则追加
              cat build.gradle.override > build.gradle.new
              cat build.gradle >> build.gradle.new
              mv build.gradle.new build.gradle
          fi
          rm -f build.gradle.override

          # 2. 修复 settings.gradle（如果有 dependencyResolutionManagement）
          if [ -f settings.gradle ]; then
              # 删除所有现有的 maven 仓库定义（包括阿里云等）
              sed -i '/maven {/,/}/d' settings.gradle
              # 确保 repositories 块中只有 google 和 mavenCentral
              sed -i '/repositories {/a\        google()\n        mavenCentral()' settings.gradle
          fi

          # 3. 同样处理 app/build.gradle 和 pyramid/build.gradle（避免残留）
          for mod in app pyramid; do
              if [ -f "$mod/build.gradle" ]; then
                  sed -i '/repositories {/,/}/c\    repositories {\n        google()\n        mavenCentral()\n    }' "$mod/build.gradle"
              fi
          done

      - name: Fix Chaquo Python Path
        working-directory: ./project
        run: |
          if [ -f pyramid/build.gradle ]; then
            sed -i '/chaquopy {/a\        buildPython = "/usr/bin/python3"' pyramid/build.gradle
          fi

      - name: Build APK
        working-directory: ./project
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 7.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./project/app/build/outputs/apk/**/*.apk
          overwrite: true
          if-no-files-found: error
