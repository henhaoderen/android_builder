name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # 安装Python3
      - name: Install Python3
        run: sudo apt update && sudo apt install -y python3 python3-pip

      - id: get-project
        name: Get project git url
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone android source
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      # 修复local.properties缺失
      - name: Create local.properties
        working-directory: ./project
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # 新增：屏蔽阿里云镜像，改用官方maven/google源，解决502报错
      - name: Fix Aliyun Maven 502 Error
        working-directory: ./project
        run: |
          sed -i 's/maven.aliyun.com/#maven.aliyun.com/g' build.gradle
          sed -i '/repositories {/a\        mavenCentral()\n        google()' build.gradle

      # 修复chaquopy硬编码Windows Python路径
      - name: Fix Chaquo Python Path
        working-directory: ./project
        run: |
          sed -i '/chaquopy {/a\        buildPython = "/usr/bin/python3"' pyramid/build.gradle

      - name: Build APK
        working-directory: ./project
        run: |
          if [ ! -f "gradlew" ]; then gradle wrapper; fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./project/**/*.apk
          overwrite: true
          if-no-files-found: error
