name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python3
        run: sudo apt update && sudo apt install -y python3 python3-pip

      - id: get-project
        name: Get project git url
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone android source
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      - name: Create local.properties
        working-directory: ./project
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ========================================================
      # 覆盖所有 repositories，只使用官方仓库（无阿里云镜像）
      # ========================================================
      - name: Override repositories with official sources
        working-directory: ./project
        run: |
          # 定义标准仓库配置（官方 Google、Maven Central、JitPack）
          cat > repos.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF

          # 处理根目录 build.gradle
          if grep -q '^allprojects' build.gradle; then
              sed -i '/^allprojects/,/^}/c\
          allprojects {\
              repositories {\
                  google()\
                  mavenCentral()\
                  maven { url "https://jitpack.io" }\
              }\
          }' build.gradle
          else
              cat repos.gradle >> build.gradle
          fi

          # 处理 settings.gradle（如果有 dependencyResolutionManagement）
          if [ -f settings.gradle ]; then
              sed -i '/dependencyResolutionManagement/,/}/d' settings.gradle
              cat >> settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF
          fi

          # 清理子模块中的独立 repositories 块（避免冲突）
          for mod in app pyramid; do
              if [ -f "$mod/build.gradle" ]; then
                  sed -i '/repositories {/,/}/d' "$mod/build.gradle"
              fi
          done

          rm -f repos.gradle

      # ========================================================
      # 修复 Chaquo Python 路径（Windows → Linux）
      # ========================================================
      - name: Fix Chaquo Python Path
        working-directory: ./project
        run: |
          if [ -f pyramid/build.gradle ]; then
            sed -i '/chaquopy {/a\        buildPython = "/usr/bin/python3"' pyramid/build.gradle
          fi

      - name: Build APK
        working-directory: ./project
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 7.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./project/app/build/outputs/apk/**/*.apk
          overwrite: true
          if-no-files-found: error
